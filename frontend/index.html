<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capital City Finder</title>
    <!-- <link rel="stylesheet" href="styles.css" /> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="m-5">
    <div class="container text-center d-grid gap-2 col-6">
      <h1 class="display-2">Captial City Finder</h1>
      <div>
        <input id="input" list="countries" autocomplete="off" class="form-control form-control-md mt-5" type="text" placeholder="Enter country" aria-label=".form-control-lg example">
        <datalist id="countries"></datalist>
        <!-- <input class="form-control" type="text" id="input" placeholder="Country" autocomplete="off"> -->
        <div class="d-grid gap-2">
          <button id="submit-btn" type="button" class="btn btn-outline-info mt-3">Info</button>
        <!-- <button class="bbtn btn-outline-info" value="Submit" type="button" id="submit-btn"></button> -->
        </div>
        <div class="result display-7 mt-5" id="output"></div>
      </div>
    </div>
    <script type="module" src="scripts/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
